name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.60.37.185
          username: root
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            if [ ! -d "/opt/roots-systemplaner" ]; then
              git clone https://github.com/Hacklerflow/Roots-Systemplaner.git /opt/roots-systemplaner
            fi

            cd /opt/roots-systemplaner
            git pull origin main

            if [ ! -f ".env" ]; then
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
              echo "PORT=3001" >> .env
              echo "VITE_API_URL=http://72.60.37.185:3001" >> .env
            fi

            PORT=3002 docker compose up --build -d
            docker image prune -f
